dense_truth_policy: hidden from deployable selectors; evaluation-only replay reference
shared_evaluator: nearest-observation reconstruction for every primary comparison
  arm
objective: expected nearest-observation squared-error reduction per cost under a revealed-only
  model-averaged anisotropic Matern-3/2 variogram
calibration: latent PCA scores standardized to unit variance; eigenvalue-weighted
  sill; likelihood-tempered kernel model averaging
front_weighting: w = 1 + kappa * exp(-0.5 * (front_distance_nm / bandwidth_nm)^2)
nested_variogram: v5.1 arms fit gamma(d) = c0 + c1*(1 - matern32(d/l)) + c2*d by Cressie-weighted
  NNLS on the binned empirical semivariogram of revealed subtiles; the linear term
  equals the deterministic coverage gain, so the baseline is the data-selectable special
  case c1 = 0
nested_front_weighting: v5.1 arms weight pixels by 1 + kappa * alteration_front_probability,
  the uncertainty-inflated front field of the shared evaluator's own prediction
pilot_seeding: default_rng([seed, slice]); paired across policies within a slice,
  varying across slices
baseline_equivalence: gamma(d) = d with uniform weights reproduces uncertainty_lookahead
co_primary_endpoint: trailing-median composite over the final 6 reveals; pre-registered
  2026-06-11 after policy-agnostic endpoint-volatility diagnostics on the 10-slice
  smoke, before any 30-slice gate run
front_semantics: frozen unsupervised alteration-front proxy; not expert-labeled corrosion
  truth
